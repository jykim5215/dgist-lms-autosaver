services:
  - type: web
    name: dgist-lms-autosaver
    runtime: docker
    repo: https://github.com/jykim5215/dgist-lms-autosaver
    branch: main
    plan: starter
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    dockerfilePath: ./Dockerfile
    disk:
      name: autosaver-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: AUTOSAVER_ROOT
        value: "/var/data"
      - key: AUTOSAVER_MULTI_USER
        value: "1"
      - key: AUTOSAVER_UI_HOST
        value: "0.0.0.0"
      - key: AUTOSAVER_OPEN_BROWSER
        value: "0"
      - key: AUTOSAVER_HEADLESS
        value: "1"
      - key: AUTOSAVER_USERS_ROOT
        value: "/var/data/users"
      - key: AUTOSAVER_GOOGLE_CLIENT_ID
        sync: false
      - key: AUTOSAVER_GOOGLE_CLIENT_SECRET
        sync: false
